# Manual, self-serve criterion benchmark for the `filter_kernels` bench.
#
# Runs the bench on a HEAD ref and a BASE ref and prints a critcmp comparison,
# on both an ARM64 and an x86-64 GitHub-hosted runner, so a head-vs-base delta
# can be checked across architectures.
#
# Trigger from the Actions tab (workflow_dispatch). This file only needs to
# exist on the branch you dispatch it from; it fetches and checks out the refs
# you pass as inputs, so it does NOT have to live on the PR branch.
name: filter-kernels-bench

on:
  workflow_dispatch:
    inputs:
      head_ref:
        description: "Branch or SHA to benchmark (HEAD)"
        required: true
        default: "jeadie/filter-list-specialization"
      base_ref:
        description: "Baseline branch or SHA. Use the commit's parent (44f377284) to isolate this commit."
        required: true
        default: "main"
      filter:
        description: "criterion benchmark-name regex (leave EMPTY to run ALL filter_kernels benchmarks)"
        required: false
        default: ""

concurrency:
  group: filter-bench-${{ github.ref }}-${{ github.event.inputs.head_ref }}
  cancel-in-progress: true

jobs:
  bench:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04-arm
            arch: arm64
          - runner: ubuntu-latest
            arch: x86_64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          key: filter-bench-${{ matrix.arch }}

      - name: Install critcmp
        run: cargo install critcmp --locked

      - name: Fetch refs
        run: git fetch --no-tags --force origin '+refs/heads/*:refs/remotes/origin/*'

      # BASE first, then HEAD. criterion baselines live under target/criterion
      # and survive the checkout, so critcmp can compare the two afterwards.
      - name: Benchmark BASE (${{ github.event.inputs.base_ref }})
        env:
          REF: ${{ github.event.inputs.base_ref }}
          FILTER: ${{ github.event.inputs.filter }}
        run: |
          git checkout --force --detach "origin/$REF" 2>/dev/null || git checkout --force --detach "$REF"
          git log -1 --oneline
          args=(--save-baseline base --warm-up-time 3 --measurement-time 8)
          [ -n "$FILTER" ] && args+=("$FILTER")   # empty filter => run all benchmarks
          cargo bench -p arrow --bench filter_kernels --features test_utils -- "${args[@]}"

      - name: Benchmark HEAD (${{ github.event.inputs.head_ref }})
        env:
          REF: ${{ github.event.inputs.head_ref }}
          FILTER: ${{ github.event.inputs.filter }}
        run: |
          git checkout --force --detach "origin/$REF" 2>/dev/null || git checkout --force --detach "$REF"
          git log -1 --oneline
          args=(--save-baseline head --warm-up-time 3 --measurement-time 8)
          [ -n "$FILTER" ] && args+=("$FILTER")   # empty filter => run all benchmarks
          cargo bench -p arrow --bench filter_kernels --features test_utils -- "${args[@]}"

      - name: Compare (base vs head)
        run: |
          {
            echo "## \`${{ matrix.runner }}\` (${{ matrix.arch }})"
            echo "head=\`${{ github.event.inputs.head_ref }}\`  base=\`${{ github.event.inputs.base_ref }}\`"
            echo '```'
            critcmp base head
            echo '```'
          } | tee -a "$GITHUB_STEP_SUMMARY"
